<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès invalide — The Web3 Settlers</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f7f7f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:16px;max-width:480px;width:100%;padding:40px 36px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.icon{font-size:48px;margin-bottom:20px}
h1{font-size:20px;font-weight:600;margin-bottom:10px;color:#1a1a18}
p{font-size:14px;color:#6b6b66;line-height:1.7;margin-bottom:24px}
.btn{display:inline-block;background:#1a1a18;color:#fff;text-decoration:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500}
.sub{font-size:12px;color:#9b9b95;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔑</div>
  <h1>Lien d'accès invalide</h1>
  <p>Ce lien d'accès n'existe pas ou a expiré. Si vous avez acheté le cours, vérifiez l'email de confirmation que vous avez reçu.</p>
  <a href="/" class="btn">Retour à l'accueil</a>
  <p class="sub">Besoin d'aide ? Répondez à votre email de confirmation.</p>
</div>
</body>
</html>
